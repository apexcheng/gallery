  <title>Gallery Admin</title>
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#0f172a;--muted:#64748b;--line:rgba(15,23,42,.12);--blue:#2563eb;--blue2:rgba(37,99,235,.1);--red:#dc2626;--green:#16a34a;--orange:#d97706;--shadow:0 24px 70px rgba(15,23,42,.1);--r:22px}*{box-sizing:border-box}html,body{min-height:100%;margin:0}body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 0 0,rgba(37,99,235,.16),transparent 34rem),radial-gradient(circle at 100% 0,rgba(14,165,233,.13),transparent 32rem),linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%);color:var(--text);overflow-x:hidden;-webkit-text-size-adjust:100%}button,input,textarea{font:inherit}.hide{display:none!important}.top{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;min-height:72px;padding:max(12px,env(safe-area-inset-top)) clamp(14px,3vw,34px) 12px;border-bottom:1px solid var(--line);background:rgba(248,251,255,.84);backdrop-filter:blur(18px)}.logo{display:grid;place-items:center;width:40px;height:40px;border-radius:15px;background:linear-gradient(135deg,#2563eb,#0ea5e9);color:#fff;font-weight:900;box-shadow:0 14px 28px rgba(37,99,235,.24)}.brand{display:flex;align-items:center;gap:10px;color:inherit;text-decoration:none}.brand b{display:block;font-size:16px}.brand span span{display:block;margin-top:2px;color:var(--muted);font-size:12px}.spacer{flex:1}.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:40px;padding:0 14px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.78);color:var(--text);font-weight:750;text-decoration:none;cursor:pointer;box-shadow:0 10px 28px rgba(15,23,42,.06)}.btn:disabled{opacity:.55;cursor:not-allowed}.primary{border-color:rgba(37,99,235,.24);background:var(--blue);color:#fff}.soft{border-color:rgba(37,99,235,.22);background:var(--blue2);color:var(--blue)}.danger{border-color:rgba(220,38,38,.22);background:rgba(220,38,38,.1);color:var(--red)}.ghost{background:transparent;box-shadow:none}.login{display:grid;place-items:center;min-height:calc(100vh - 72px);padding:24px 14px}.login-card,.panel,.form,.preview,.empty{border:1px solid var(--line);border-radius:var(--r);background:rgba(255,255,255,.88);box-shadow:var(--shadow)}.login-card{width:min(520px,100%);padding:26px}.login-card h1{margin:0 0 10px;font-size:clamp(24px,5vw,34px);line-height:1.1}.login-card p{margin:0 0 16px;color:var(--muted);line-height:1.6}.token{display:none;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}.token.show{display:grid;gap:10px}.layout{display:grid;grid-template-columns:minmax(270px,360px) minmax(0,1fr);gap:18px;padding:18px clamp(14px,3vw,34px) 34px}.side{position:sticky;top:90px;align-self:start;max-height:calc(100vh - 112px);display:flex;flex-direction:column;overflow:hidden}.head{display:flex;align-items:center;gap:12px;padding:18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.68)}.head h1,.head h2{margin:0;font-size:17px}.head p{margin:4px 0 0;color:var(--muted);font-size:13px}.tools{display:grid;gap:10px;padding:14px;border-bottom:1px solid var(--line)}.input,.textarea,.search{width:100%;min-height:44px;padding:10px 12px;border:1px solid var(--line);border-radius:13px;background:#fff;color:var(--text);outline:none}.textarea{min-height:120px;resize:vertical}.input:focus,.textarea:focus,.search:focus{border-color:rgba(37,99,235,.55);box-shadow:0 0 0 3px rgba(37,99,235,.12)}.list{overflow:auto;padding:10px}.item{width:100%;display:grid;grid-template-columns:58px minmax(0,1fr);gap:10px;padding:10px;border:1px solid transparent;border-radius:16px;background:transparent;text-align:left;cursor:pointer}.item.active,.item:hover{border-color:rgba(37,99,235,.28);background:rgba(37,99,235,.09)}.thumb{width:58px;height:58px;border-radius:14px;object-fit:cover;background:#e2e8f0}.title{display:block;margin:3px 0 4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;font-weight:800}.meta{margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:12px}.editor{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(280px,.85fr);gap:18px;padding:18px}.form{padding:18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:grid;gap:7px}.full{grid-column:1/-1}.field label{color:#334155;font-size:13px;font-weight:800}.help{margin:0;color:var(--muted);font-size:12px;line-height:1.45}.check{display:flex;align-items:center;gap:9px;min-height:44px;color:#334155;font-weight:750}.file{width:100%;padding:12px;border:1px dashed rgba(37,99,235,.34);border-radius:16px;background:rgba(37,99,235,.06)}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}.preview{align-self:start;position:sticky;top:90px;overflow:hidden}.preview img{width:100%;aspect-ratio:4/3;object-fit:cover;background:#e2e8f0}.preview div{padding:16px}.preview h3{margin:0 0 8px;font-size:18px}.preview p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}.status{min-height:22px;color:var(--muted);font-size:13px;line-height:1.45}.ok{color:var(--green)}.err{color:var(--red)}.warn{color:var(--orange)}.empty{display:grid;place-items:center;min-height:420px;padding:32px;text-align:center}.toast{position:fixed;right:18px;bottom:18px;z-index:20;max-width:min(420px,calc(100vw - 32px));padding:13px 15px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.94);font-weight:750;box-shadow:var(--shadow);opacity:0;transform:translateY(14px);pointer-events:none;transition:.18s}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:980px){.layout{grid-template-columns:1fr}.side{position:static;max-height:none}.list{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(220px,1fr);overflow-x:auto;padding-bottom:14px}.editor{grid-template-columns:1fr}.preview{position:static}}@media(max-width:640px){.top{min-height:60px;padding:max(10px,env(safe-area-inset-top)) 10px 10px}.logo{width:34px;height:34px;border-radius:12px}.brand b{font-size:15px}.brand span span,.old{display:none}.btn{min-height:38px;padding:0 10px;font-size:13px}.layout{gap:12px;padding:10px 10px 18px}.panel,.form,.preview,.login-card,.empty{border-radius:18px}.head,.editor,.form{padding:14px}.grid{grid-template-columns:1fr}.list{grid-auto-columns:minmax(196px,78vw)}.input,.textarea,.search,.btn{font-size:16px}.actions{display:grid;grid-template-columns:1fr 1fr}.actions .primary{grid-column:1/-1}.preview{display:none}}
  </style>
</head>
<body>
  <header class="top">
    <a class="brand" href="../"><span class="logo">G</span><span><b>Gallery Admin</b><span>自定义照片管理后台</span></span></a>
    <span class="spacer"></span>
    <a class="btn old" href="decap.html">旧版后台</a>
    <a class="btn soft" href="../">查看相册</a>
    <button id="logout" class="btn ghost hide" type="button">退出</button>
  </header>

  <section id="loginView" class="login">
    <div class="login-card">
      <h1>登录后管理相册</h1>
      <p>继续使用原来的 GitHub OAuth Worker。已修复授权弹窗的双向握手，授权成功后会自动进入后台。</p>
      <button id="login" class="btn primary" type="button">使用 GitHub 登录</button>
      <button id="showToken" class="btn ghost" type="button">登录失败时手动输入 Token</button>
      <div id="tokenBox" class="token">
        <input id="manualToken" class="input" type="password" placeholder="粘贴具备仓库写入权限的 GitHub token" autocomplete="off" />
        <button id="useToken" class="btn soft" type="button">使用这个 Token</button>
        <p class="help">这是备用入口。正常情况下优先使用 GitHub 登录。</p>
      </div>
      <p id="loginStatus" class="status"></p>
    </div>
  </section>

  <main id="adminView" class="layout hide">
    <aside class="panel side">
      <div class="head"><div><h1>照片列表</h1><p id="count">正在加载...</p></div></div>
      <div class="tools"><input id="search" class="search" type="search" placeholder="搜索标题、分类、描述..." /><button id="add" class="btn primary" type="button">新增照片</button></div>
      <div id="list" class="list"></div>
    </aside>

    <section class="panel">
      <div class="head"><div><h2 id="editTitle">照片编辑</h2><p id="sub">修改后点击保存，会提交到 GitHub main 分支。</p></div><span class="spacer"></span><button id="reload" class="btn ghost" type="button">重新加载</button></div>
      <div id="empty" class="empty hide"><div><h2>还没有照片</h2><p class="help">点击“新增照片”开始创建第一条记录。</p><button id="emptyAdd" class="btn primary" type="button">新增照片</button></div></div>
      <div id="editor" class="editor">
        <form id="form" class="form">
          <div class="grid">
            <div class="field"><label>标题</label><input id="title" class="input" type="text" placeholder="例如：春日风景" /></div>
            <div class="field"><label>分类</label><input id="category" class="input" type="text" placeholder="默认分类" /></div>
            <div class="field"><label>日期</label><input id="date" class="input" type="date" /></div>
            <label class="check"><input id="featured" type="checkbox" /> 是否精选</label>
            <div class="field full"><label>图片地址</label><input id="image" class="input" type="text" placeholder="/gallery/assets/images/uploads/example.jpg" /><p class="help">可以直接填外链，也可以下面上传本地图片。</p></div>
            <div class="field full"><label>上传图片</label><input id="file" class="file" type="file" accept="image/*" /><p id="fileHelp" class="help">选择文件后，点击保存时会自动上传到 GitHub。</p></div>
            <div class="field full"><label>描述</label><textarea id="desc" class="textarea" placeholder="填写照片说明，可留空"></textarea></div>
          </div>
          <div class="actions"><button id="save" class="btn primary" type="submit">保存全部</button><button id="up" class="btn soft" type="button">上移</button><button id="down" class="btn soft" type="button">下移</button><button id="del" class="btn danger" type="button">删除</button></div>
          <p id="saveStatus" class="status"></p>
        </form>
        <article class="preview"><img id="previewImg" alt="照片预览" /><div><h3 id="previewTitle">未命名照片</h3><p id="previewMeta"></p><p id="previewDesc"></p></div></article>
      </div>
    </section>
  </main>
  <div id="toast" class="toast"></div>

  <script>
  (function(){
    "use strict";
    var CONFIG={repo:"apexcheng/gallery",branch:"main",dataPath:"data/photos.json",uploadDir:"assets/images/uploads",publicUploadPrefix:"/gallery/assets/images/uploads",authUrl:"https://gallery.1677880403a.workers.dev/auth?provider=github&site_id="+encodeURIComponent(location.host),tokenKey:"gallery_admin_github_token"};
    var state={token:localStorage.getItem(CONFIG.tokenKey)||"",photos:[],sha:"",index:0,query:"",dirty:false,saving:false};
    var $=function(id){return document.getElementById(id)};
    var el={loginView:$("loginView"),adminView:$("adminView"),login:$("login"),showToken:$("showToken"),tokenBox:$("tokenBox"),manualToken:$("manualToken"),useToken:$("useToken"),loginStatus:$("loginStatus"),logout:$("logout"),reload:$("reload"),add:$("add"),emptyAdd:$("emptyAdd"),search:$("search"),list:$("list"),count:$("count"),editTitle:$("editTitle"),sub:$("sub"),empty:$("empty"),editor:$("editor"),form:$("form"),title:$("title"),category:$("category"),date:$("date"),featured:$("featured"),image:$("image"),file:$("file"),fileHelp:$("fileHelp"),desc:$("desc"),save:$("save"),up:$("up"),down:$("down"),del:$("del"),saveStatus:$("saveStatus"),previewImg:$("previewImg"),previewTitle:$("previewTitle"),previewMeta:$("previewMeta"),previewDesc:$("previewDesc"),toast:$("toast")};
    function cls(node,base,type){node.className=base+(type?" "+type:"")}
    function status(node,msg,type){node.textContent=msg||"";cls(node,"status",type)}
    function toast(msg){el.toast.textContent=msg;el.toast.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(function(){el.toast.classList.remove("show")},2500)}
    function show(view){el.loginView.classList.toggle("hide",view!=="login");el.adminView.classList.toggle("hide",view!=="admin");el.logout.classList.toggle("hide",view!=="admin")}
    function encPath(path){return path.split("/").map(encodeURIComponent).join("/")}
    function api(path){return "https://api.github.com"+path}
    async function gh(path,opt){var r=await fetch(api(path),{method:opt&&opt.method||"GET",headers:{Accept:"application/vnd.github+json",Authorization:"Bearer "+state.token,"X-GitHub-Api-Version":"2022-11-28"},body:opt&&opt.body?JSON.stringify(opt.body):undefined});var t=await r.text();var d=t?JSON.parse(t):null;if(!r.ok)throw new Error((d&&d.message||"GitHub API 请求失败")+" (HTTP "+r.status+")");return d}
    function b64ToText(b){var bin=atob((b||"").replace(/\n/g,""));var bytes=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new TextDecoder("utf-8").decode(bytes)}
    function textToB64(s){var bytes=new TextEncoder().encode(s);var bin="";for(var i=0;i<bytes.length;i+=32768)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+32768));return btoa(bin)}
    function imgPath(p){return /^https?:\/\//.test(p||"")?p:(p||"")}
    function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
    function current(){return state.photos[state.index]||null}
    function clean(p){var o={title:p.title||"",category:p.category||"默认分类",image:p.image||"",desc:p.desc||"",featured:!!p.featured};if(p.date)o.date=p.date;if(p.thumb)o.thumb=p.thumb;return o}
    function saveForm(){var p=current();if(!p)return;p.title=el.title.value.trim();p.category=el.category.value.trim()||"默认分类";p.date=el.date.value;p.featured=el.featured.checked;p.image=el.image.value.trim();p.desc=el.desc.value.trim()}
    function filtered(){var q=state.query.trim().toLowerCase();return state.photos.map(function(p,i){return{p:p,i:i}}).filter(function(x){if(!q)return true;return [x.p.title,x.p.category,x.p.desc,x.p.date].filter(Boolean).join(" ").toLowerCase().indexOf(q)!==-1})}
    function renderList(){var items=filtered();el.list.innerHTML="";el.count.textContent=state.photos.length+" 张照片";items.forEach(function(x){var b=document.createElement("button");var src=x.p.thumb||x.p.image||"";b.type="button";b.className="item"+(x.i===state.index?" active":"");b.innerHTML='<img class="thumb" src="'+esc(imgPath(src))+'" alt=""><span><strong class="title">'+esc(x.p.title||"未命名照片")+'</strong><p class="meta">'+esc([x.p.category||"未分类",x.p.date||""].filter(Boolean).join(" · "))+'</p></span>';b.onclick=function(){saveForm();state.index=x.i;render()};el.list.appendChild(b)})}
    function renderForm(){var p=current();var has=!!p;el.empty.classList.toggle("hide",has||state.photos.length>0);el.editor.classList.toggle("hide",!has);if(!has&&state.photos.length){state.index=0;p=current();has=!!p}if(!p)return;el.editTitle.textContent=p.title||"未命名照片";el.sub.textContent="第 "+(state.index+1)+" / "+state.photos.length+" 张";el.title.value=p.title||"";el.category.value=p.category||"默认分类";el.date.value=p.date||"";el.featured.checked=!!p.featured;el.image.value=p.image||"";el.desc.value=p.desc||"";el.file.value="";el.fileHelp.textContent=p._fileName?"待上传："+p._fileName:"选择文件后，点击保存时会自动上传到 GitHub。";renderPreview(p);el.up.disabled=state.index<=0;el.down.disabled=state.index>=state.photos.length-1;el.del.disabled=!state.photos.length}
    function renderPreview(p){var src=p._preview||p.image||p.thumb||"";el.previewImg.src=imgPath(src);el.previewTitle.textContent=p.title||"未命名照片";el.previewMeta.textContent=[p.category||"未分类",p.date||""].filter(Boolean).join(" · ");el.previewDesc.textContent=p.desc||""}
    function render(){renderList();renderForm()}
    function dirty(){state.dirty=true;saveForm();renderList();renderPreview(current()||{});status(el.saveStatus,"有未保存修改","warn")}
    async function loadData(){status(el.saveStatus,"正在加载 GitHub 数据...");var f=await gh("/repos/"+CONFIG.repo+"/contents/"+encPath(CONFIG.dataPath)+"?ref="+encodeURIComponent(CONFIG.branch));var j=JSON.parse(b64ToText(f.content));state.sha=f.sha;state.photos=Array.isArray(j)?j:(j.photos||[]);state.index=Math.min(state.index,Math.max(0,state.photos.length-1));state.dirty=false;render();status(el.saveStatus,"数据已加载","ok")}
    function readFile(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(String(r.result||"").split(",")[1]||"")};r.onerror=function(){rej(new Error("读取图片失败"))};r.readAsDataURL(file)})}
    function safeName(name){var dot=name.lastIndexOf(".");var ext=dot>=0?name.slice(dot).toLowerCase():".jpg";var base=(dot>=0?name.slice(0,dot):name).normalize("NFKD").replace(/[^\w\u4e00-\u9fa5-]+/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"").slice(0,50)||"photo";return Date.now()+"-"+base+ext}
    async function uploadFiles(){for(var i=0;i<state.photos.length;i++){var p=state.photos[i];if(!p._file)continue;var name=safeName(p._file.name);var path=CONFIG.uploadDir+"/"+name;var pub=CONFIG.publicUploadPrefix+"/"+name;await gh("/repos/"+CONFIG.repo+"/contents/"+encPath(path),{method:"PUT",body:{message:"Upload gallery image: "+name,content:await readFile(p._file),branch:CONFIG.branch}});p.image=pub;p.thumb=pub;delete p._file;delete p._fileName;delete p._preview}}
    async function saveData(e){if(e)e.preventDefault();if(state.saving)return;try{state.saving=true;el.save.disabled=true;saveForm();status(el.saveStatus,"正在上传图片和保存数据...");await uploadFiles();var payload={photos:state.photos.map(clean)};var r=await gh("/repos/"+CONFIG.repo+"/contents/"+encPath(CONFIG.dataPath),{method:"PUT",body:{message:"Update gallery photos",content:textToB64(JSON.stringify(payload,null,2)+"\n"),sha:state.sha,branch:CONFIG.branch}});state.sha=r.content.sha;state.photos=payload.photos;state.dirty=false;render();status(el.saveStatus,"保存成功，GitHub Pages 稍后自动更新","ok");toast("保存成功")}catch(err){console.error(err);status(el.saveStatus,err.message||"保存失败","err");toast("保存失败："+(err.message||"未知错误"))}finally{state.saving=false;el.save.disabled=false}}
    async function verify(){try{show("admin");status(el.saveStatus,"正在验证登录...");await gh("/user");await loadData();toast("登录成功")}catch(err){console.error(err);localStorage.removeItem(CONFIG.tokenKey);state.token="";show("login");status(el.loginStatus,"登录状态无效，请重新登录。"+(err.message?" "+err.message:""),"err")}}
    function parseToken(data){if(!data)return null;if(typeof data==="object")return data.token||data.access_token||(data.payload&&data.payload.token)||null;if(typeof data!=="string")return null;var ok="authorization:github:success:";var bad="authorization:github:error:";if(data.indexOf(bad)===0)throw new Error(data.slice(bad.length)||"GitHub 登录失败");if(data.indexOf(ok)===0){var raw=data.slice(ok.length);var j=JSON.parse(raw);return j.token||j.access_token||null}try{var x=JSON.parse(data);return x.token||x.access_token||null}catch(e){return null}}
    function saveToken(token){state.token=token;localStorage.setItem(CONFIG.tokenKey,token);status(el.loginStatus,"登录成功，正在加载相册...","ok");verify()}
    function login(){status(el.loginStatus,"正在打开 GitHub 登录窗口...");var pop=window.open(CONFIG.authUrl,"gallery-auth","width=980,height=720");if(!pop){status(el.loginStatus,"浏览器拦截了登录窗口，请允许弹窗后重试。","err");return}var timer=setTimeout(function(){status(el.loginStatus,"已授权但还未收到登录信息。请保持本页打开，再点一次 GitHub 登录重试。","warn")},30000);function onMsg(ev){try{if(ev.data==="authorizing:github"){if(ev.source)ev.source.postMessage("authorizing:github",ev.origin||"*");status(el.loginStatus,"GitHub 已授权，正在接收登录信息...");return}var token=parseToken(ev.data);if(!token)return;clearTimeout(timer);window.removeEventListener("message",onMsg);try{pop.close()}catch(e){}saveToken(token)}catch(err){clearTimeout(timer);window.removeEventListener("message",onMsg);status(el.loginStatus,err.message||"登录失败","err")}}window.addEventListener("message",onMsg)}
    function add(){saveForm();state.photos.unshift({title:"未命名照片",category:"默认分类",image:"",desc:"",date:new Date().toISOString().slice(0,10),featured:false});state.index=0;state.dirty=true;status(el.saveStatus,"已新增照片，填写后记得保存","warn");render()}
    function del(){if(!current())return;if(!confirm("确定删除这张照片吗？保存后会从数据中移除。"))return;state.photos.splice(state.index,1);state.index=Math.max(0,state.index-1);state.dirty=true;status(el.saveStatus,"已删除，点击保存后生效","warn");render()}
    function move(step){var ni=state.index+step;if(ni<0||ni>=state.photos.length)return;saveForm();var p=state.photos.splice(state.index,1)[0];state.photos.splice(ni,0,p);state.index=ni;state.dirty=true;status(el.saveStatus,"顺序已调整，点击保存后生效","warn");render()}
