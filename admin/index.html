<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gallery Admin</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-soft: rgba(255, 255, 255, 0.78);
      --border: rgba(15, 23, 42, 0.10);
      --border-strong: rgba(15, 23, 42, 0.16);
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-soft: rgba(37, 99, 235, 0.10);
      --danger: #dc2626;
      --danger-soft: rgba(220, 38, 38, 0.10);
      --success: #16a34a;
      --warning: #d97706;
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow-x: hidden;
      background:
        radial-gradient(circle at 0 0, rgba(37, 99, 235, 0.16), transparent 34rem),
        radial-gradient(circle at 100% 0, rgba(14, 165, 233, 0.13), transparent 32rem),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .hidden {
      display: none !important;
    }

    .app {
      min-height: 100vh;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 72px;
      padding: max(12px, env(safe-area-inset-top)) clamp(16px, 3vw, 34px) 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(248, 251, 255, 0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--text);
      text-decoration: none;
    }

    .brand-logo {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      border-radius: 15px;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      color: #fff;
      font-weight: 900;
      box-shadow: 0 14px 28px rgba(37, 99, 235, 0.24);
    }

    .brand-title {
      display: block;
      font-size: 16px;
      font-weight: 850;
      line-height: 1.15;
      letter-spacing: 0.01em;
    }

    .brand-subtitle {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .topbar-spacer {
      flex: 1 1 auto;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 40px;
      padding: 0 15px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--text);
      font-size: 14px;
      font-weight: 750;
      text-decoration: none;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
    }

    .btn-primary {
      border-color: rgba(37, 99, 235, 0.24);
      background: var(--primary);
      color: #fff;
    }

    .btn-soft {
      border-color: rgba(37, 99, 235, 0.20);
      background: var(--primary-soft);
      color: var(--primary);
    }

    .btn-danger {
      border-color: rgba(220, 38, 38, 0.20);
      background: var(--danger-soft);
      color: var(--danger);
    }

    .btn-ghost {
      background: transparent;
      box-shadow: none;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(270px, 360px) minmax(0, 1fr);
      gap: 18px;
      padding: 18px clamp(16px, 3vw, 34px) 34px;
    }

    .panel {
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
    }

    .sidebar {
      position: sticky;
      top: 90px;
      align-self: start;
      max-height: calc(100vh - 112px);
      display: flex;
      flex-direction: column;
    }

    .panel-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.68);
    }

    .panel-title {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    .panel-desc {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .sidebar-tools {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--border);
    }

    .search {
      width: 100%;
      min-height: 42px;
      padding: 0 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .search:focus,
    .field-input:focus,
    .field-textarea:focus {
      border-color: rgba(37, 99, 235, 0.55);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .photo-list {
      overflow: auto;
      padding: 10px;
    }

    .photo-item {
      width: 100%;
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 10px;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: 16px;
      background: transparent;
      text-align: left;
    }

    .photo-item:hover {
      background: rgba(37, 99, 235, 0.06);
    }

    .photo-item.active {
      border-color: rgba(37, 99, 235, 0.28);
      background: rgba(37, 99, 235, 0.10);
    }

    .photo-thumb {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      object-fit: cover;
      background: #e2e8f0;
    }

    .photo-title {
      margin: 3px 0 4px;
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .photo-meta {
      margin: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
      gap: 18px;
      padding: 18px;
    }

    .form-card,
    .preview-card,
    .login-card,
    .empty-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--surface);
      box-shadow: 0 16px 42px rgba(15, 23, 42, 0.07);
    }

    .form-card {
      padding: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field-full {
      grid-column: 1 / -1;
    }

    .field-label {
      color: #334155;
      font-size: 13px;
      font-weight: 800;
    }

    .field-input,
    .field-textarea {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      outline: none;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .field-textarea {
      min-height: 120px;
      resize: vertical;
    }

    .field-help {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 44px;
      color: #334155;
      font-size: 14px;
      font-weight: 750;
    }

    .checkbox-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .file-input {
      width: 100%;
      padding: 12px;
      border: 1px dashed rgba(37, 99, 235, 0.34);
      border-radius: var(--radius-md);
      background: rgba(37, 99, 235, 0.06);
    }

    .editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .preview-card {
      overflow: hidden;
      align-self: start;
      position: sticky;
      top: 90px;
    }

    .preview-image {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #e2e8f0;
    }

    .preview-body {
      padding: 16px;
    }

    .preview-title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.25;
    }

    .preview-meta,
    .preview-desc {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .preview-desc {
      margin-top: 10px;
      color: #475569;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status.success {
      color: var(--success);
    }

    .status.error {
      color: var(--danger);
    }

    .status.warning {
      color: var(--warning);
    }

    .login-wrap {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 72px);
      padding: 28px 16px;
    }

    .login-card {
      width: min(520px, 100%);
      padding: 26px;
    }

    .login-card h1 {
      margin: 0 0 10px;
      font-size: clamp(24px, 5vw, 34px);
      line-height: 1.1;
    }

    .login-card p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    .token-box {
      display: none;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .token-box.show {
      display: grid;
      gap: 10px;
    }

    .empty-card {
      display: grid;
      place-items: center;
      min-height: 420px;
      padding: 32px;
      text-align: center;
    }

    .empty-card h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .empty-card p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 40;
      max-width: min(420px, calc(100vw - 32px));
      padding: 13px 15px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      box-shadow: var(--shadow);
      transform: translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        max-height: none;
      }

      .photo-list {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(220px, 1fr);
        overflow-x: auto;
        padding-bottom: 14px;
      }

      .editor-grid {
        grid-template-columns: 1fr;
      }

      .preview-card {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        min-height: 60px;
        padding: max(10px, env(safe-area-inset-top)) 12px 10px;
      }

      .brand-logo {
        width: 34px;
        height: 34px;
        border-radius: 12px;
      }

      .brand-title {
        font-size: 15px;
      }

      .brand-subtitle {
        display: none;
      }

      .topbar-actions {
        gap: 6px;
      }

      .topbar-actions .btn-secondary {
        display: none;
      }

      .btn {
        min-height: 38px;
        padding: 0 11px;
        font-size: 13px;
      }

      .layout {
        gap: 12px;
        padding: 10px 10px 18px;
      }

      .panel,
      .form-card,
      .preview-card,
      .login-card,
      .empty-card {
        border-radius: 18px;
      }

      .panel-head,
      .editor-grid,
      .form-card {
        padding: 14px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .photo-list {
        grid-auto-columns: minmax(196px, 78vw);
      }

      .field-input,
      .field-textarea,
      .search,
      .btn {
        font-size: 16px;
      }

      .editor-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .editor-actions .btn-primary {
        grid-column: 1 / -1;
      }

      .preview-card {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <a class="brand" href="../">
        <span class="brand-logo">G</span>
        <span>
          <span class="brand-title">Gallery Admin</span>
          <span class="brand-subtitle">自定义照片管理后台</span>
        </span>
      </a>
      <span class="topbar-spacer"></span>
      <div class="topbar-actions">
        <a class="btn btn-secondary" href="decap.html">旧版后台</a>
        <a class="btn btn-soft" href="../">查看相册</a>
        <button id="logoutBtn" class="btn btn-ghost hidden" type="button">退出</button>
      </div>
    </header>

    <section id="loginView" class="login-wrap">
      <div class="login-card">
        <h1>登录后管理相册</h1>
        <p>认证仍使用原来的 GitHub OAuth Worker。登录成功后，新后台会直接读写 GitHub 仓库中的相册数据。</p>
        <button id="loginBtn" class="btn btn-primary" type="button">使用 GitHub 登录</button>
        <button id="showTokenBtn" class="btn btn-ghost" type="button">登录失败时手动输入 Token</button>

        <div id="tokenBox" class="token-box">
          <label class="field">
            <span class="field-label">GitHub Token</span>
            <input id="manualToken" class="field-input" type="password" autocomplete="off" placeholder="粘贴具备仓库写入权限的 token" />
          </label>
          <button id="useTokenBtn" class="btn btn-soft" type="button">使用这个 Token</button>
          <p class="field-help">这是备用入口。正常情况下优先使用上面的 GitHub 登录。</p>
        </div>

        <p id="loginStatus" class="status"></p>
      </div>
    </section>

    <main id="adminView" class="layout hidden">
      <aside class="panel sidebar">
        <div class="panel-head">
          <div>
            <h1 class="panel-title">照片列表</h1>
            <p id="photoCount" class="panel-desc">正在加载...</p>
          </div>
        </div>
        <div class="sidebar-tools">
          <input id="searchInput" class="search" type="search" placeholder="搜索标题、分类、描述..." />
          <button id="addPhotoBtn" class="btn btn-primary" type="button">新增照片</button>
        </div>
        <div id="photoList" class="photo-list"></div>
      </aside>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2 id="editorTitle" class="panel-title">照片编辑</h2>
            <p id="editorSubtitle" class="panel-desc">修改后点击保存，会提交到 GitHub main 分支。</p>
          </div>
          <span class="topbar-spacer"></span>
          <button id="reloadBtn" class="btn btn-ghost" type="button">重新加载</button>
        </div>

        <div id="emptyView" class="empty-card hidden">
          <div>
            <h2>还没有照片</h2>
            <p>点击“新增照片”开始创建第一条记录。</p>
            <button id="emptyAddBtn" class="btn btn-primary" type="button">新增照片</button>
          </div>
        </div>

        <div id="editorView" class="editor-grid">
          <form id="photoForm" class="form-card">
            <div class="form-grid">
              <label class="field">
                <span class="field-label">标题</span>
                <input id="titleInput" class="field-input" type="text" placeholder="例如：春日风景" />
              </label>

              <label class="field">
                <span class="field-label">分类</span>
                <input id="categoryInput" class="field-input" type="text" placeholder="默认分类" />
              </label>

              <label class="field">
                <span class="field-label">日期</span>
                <input id="dateInput" class="field-input" type="date" />
              </label>

              <label class="checkbox-row">
                <input id="featuredInput" type="checkbox" />
                是否精选
              </label>

              <label class="field field-full">
                <span class="field-label">图片地址</span>
                <input id="imageInput" class="field-input" type="text" placeholder="/gallery/assets/images/uploads/example.jpg" />
                <p class="field-help">可以直接填外链，也可以下面上传本地图片。</p>
              </label>

              <label class="field field-full">
                <span class="field-label">上传图片</span>
                <input id="fileInput" class="file-input" type="file" accept="image/*" />
                <p id="fileHelp" class="field-help">选择文件后，点击保存时会自动上传到 GitHub。</p>
              </label>

              <label class="field field-full">
                <span class="field-label">描述</span>
                <textarea id="descInput" class="field-textarea" placeholder="填写照片说明，可留空"></textarea>
              </label>
            </div>

            <div class="editor-actions">
              <button id="saveBtn" class="btn btn-primary" type="submit">保存全部</button>
              <button id="moveUpBtn" class="btn btn-soft" type="button">上移</button>
              <button id="moveDownBtn" class="btn btn-soft" type="button">下移</button>
              <button id="deleteBtn" class="btn btn-danger" type="button">删除</button>
            </div>

            <p id="saveStatus" class="status"></p>
          </form>

          <article class="preview-card">
            <img id="previewImage" class="preview-image" alt="照片预览" />
            <div class="preview-body">
              <h3 id="previewTitle" class="preview-title">未命名照片</h3>
              <p id="previewMeta" class="preview-meta"></p>
              <p id="previewDesc" class="preview-desc"></p>
            </div>
          </article>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    (function () {
      "use strict";

      var CONFIG = {
        repo: "apexcheng/gallery",
        branch: "main",
        dataPath: "data/photos.json",
        uploadDir: "assets/images/uploads",
        publicUploadPrefix: "/gallery/assets/images/uploads",
        authUrl: "https://gallery.1677880403a.workers.dev/auth?provider=github&site_id=" + encodeURIComponent(window.location.host),
        tokenKey: "gallery_admin_github_token"
      };

      var state = {
        token: localStorage.getItem(CONFIG.tokenKey) || "",
        user: null,
        photos: [],
        sha: "",
        selectedIndex: 0,
        query: "",
        dirty: false,
        saving: false
      };

      var el = {
        loginView: document.getElementById("loginView"),
        adminView: document.getElementById("adminView"),
        loginBtn: document.getElementById("loginBtn"),
        showTokenBtn: document.getElementById("showTokenBtn"),
        tokenBox: document.getElementById("tokenBox"),
        manualToken: document.getElementById("manualToken"),
        useTokenBtn: document.getElementById("useTokenBtn"),
        loginStatus: document.getElementById("loginStatus"),
        logoutBtn: document.getElementById("logoutBtn"),
        reloadBtn: document.getElementById("reloadBtn"),
        addPhotoBtn: document.getElementById("addPhotoBtn"),
        emptyAddBtn: document.getElementById("emptyAddBtn"),
        searchInput: document.getElementById("searchInput"),
        photoList: document.getElementById("photoList"),
        photoCount: document.getElementById("photoCount"),
        editorTitle: document.getElementById("editorTitle"),
        editorSubtitle: document.getElementById("editorSubtitle"),
        emptyView: document.getElementById("emptyView"),
        editorView: document.getElementById("editorView"),
        form: document.getElementById("photoForm"),
        titleInput: document.getElementById("titleInput"),
        categoryInput: document.getElementById("categoryInput"),
        dateInput: document.getElementById("dateInput"),
        featuredInput: document.getElementById("featuredInput"),
        imageInput: document.getElementById("imageInput"),
        fileInput: document.getElementById("fileInput"),
        fileHelp: document.getElementById("fileHelp"),
        descInput: document.getElementById("descInput"),
        saveBtn: document.getElementById("saveBtn"),
        moveUpBtn: document.getElementById("moveUpBtn"),
        moveDownBtn: document.getElementById("moveDownBtn"),
        deleteBtn: document.getElementById("deleteBtn"),
        saveStatus: document.getElementById("saveStatus"),
        previewImage: document.getElementById("previewImage"),
        previewTitle: document.getElementById("previewTitle"),
        previewMeta: document.getElementById("previewMeta"),
        previewDesc: document.getElementById("previewDesc"),
        toast: document.getElementById("toast")
      };

      function show(view) {
        el.loginView.classList.toggle("hidden", view !== "login");
        el.adminView.classList.toggle("hidden", view !== "admin");
        el.logoutBtn.classList.toggle("hidden", view !== "admin");
      }

      function setStatus(node, message, type) {
        node.textContent = message || "";
        node.className = "status" + (type ? " " + type : "");
      }

      function toast(message) {
        el.toast.textContent = message;
        el.toast.classList.add("show");
        window.clearTimeout(toast.timer);
        toast.timer = window.setTimeout(function () {
          el.toast.classList.remove("show");
        }, 2600);
      }

      function apiUrl(path) {
        return "https://api.github.com" + path;
      }

      async function github(path, options) {
        var response = await fetch(apiUrl(path), {
          method: options && options.method ? options.method : "GET",
          headers: Object.assign({
            "Accept": "application/vnd.github+json",
            "Authorization": "Bearer " + state.token,
            "X-GitHub-Api-Version": "2022-11-28"
          }, options && options.headers ? options.headers : {}),
          body: options && options.body ? JSON.stringify(options.body) : undefined
        });

        var text = await response.text();
        var data = text ? JSON.parse(text) : null;

        if (!response.ok) {
          var message = data && data.message ? data.message : "GitHub API 请求失败";
          throw new Error(message + " (HTTP " + response.status + ")");
        }

        return data;
      }

      function base64ToUtf8(base64) {
        var binary = atob(base64.replace(/\n/g, ""));
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return new TextDecoder("utf-8").decode(bytes);
      }

      function utf8ToBase64(text) {
        var bytes = new TextEncoder().encode(text);
        var binary = "";
        var chunkSize = 0x8000;
        for (var i = 0; i < bytes.length; i += chunkSize) {
          var chunk = bytes.subarray(i, i + chunkSize);
          binary += String.fromCharCode.apply(null, chunk);
        }
        return btoa(binary);
      }

      function normalizePath(path) {
        if (!path) return "";
        if (/^https?:\/\//.test(path)) return path;
        return path;
      }

      function cleanPhoto(photo) {
        var output = {
          title: photo.title || "",
          category: photo.category || "默认分类",
          image: photo.image || "",
          desc: photo.desc || "",
          featured: !!photo.featured
        };

        if (photo.date) {
          output.date = photo.date;
        }

        if (photo.thumb) {
          output.thumb = photo.thumb;
        }

        return output;
      }

      function selectedPhoto() {
        return state.photos[state.selectedIndex] || null;
      }

      function filteredPhotos() {
        var query = state.query.trim().toLowerCase();
        if (!query) {
          return state.photos.map(function (photo, index) {
            return { photo: photo, index: index };
          });
        }

        return state.photos
          .map(function (photo, index) {
            return { photo: photo, index: index };
          })
          .filter(function (item) {
            return [
              item.photo.title,
              item.photo.category,
              item.photo.desc,
              item.photo.date
            ].filter(Boolean).join(" ").toLowerCase().indexOf(query) !== -1;
          });
      }

      function renderList() {
        var items = filteredPhotos();
        el.photoList.innerHTML = "";
        el.photoCount.textContent = state.photos.length + " 张照片";

        items.forEach(function (item) {
          var button = document.createElement("button");
          var image = item.photo.thumb || item.photo.image || "";
          button.type = "button";
          button.className = "photo-item" + (item.index === state.selectedIndex ? " active" : "");
          button.innerHTML =
            '<img class="photo-thumb" alt="" src="' + escapeHtml(normalizePath(image)) + '">' +
            '<span>' +
              '<strong class="photo-title">' + escapeHtml(item.photo.title || "未命名照片") + '</strong>' +
              '<p class="photo-meta">' + escapeHtml([item.photo.category || "未分类", item.photo.date || ""].filter(Boolean).join(" · ")) + '</p>' +
            '</span>';

          button.addEventListener("click", function () {
            saveCurrentFromForm();
            state.selectedIndex = item.index;
            render();
          });

          el.photoList.appendChild(button);
        });
      }

      function renderForm() {
        var photo = selectedPhoto();
        var hasPhoto = !!photo;

        el.emptyView.classList.toggle("hidden", hasPhoto || state.photos.length > 0);
        el.editorView.classList.toggle("hidden", !hasPhoto);

        if (!hasPhoto && state.photos.length > 0) {
          state.selectedIndex = 0;
          photo = selectedPhoto();
        }

        if (!photo) {
          return;
        }

        el.editorTitle.textContent = photo.title || "未命名照片";
        el.editorSubtitle.textContent = "第 " + (state.selectedIndex + 1) + " / " + state.photos.length + " 张";
        el.titleInput.value = photo.title || "";
        el.categoryInput.value = photo.category || "默认分类";
        el.dateInput.value = photo.date || "";
        el.featuredInput.checked = !!photo.featured;
        el.imageInput.value = photo.image || "";
        el.descInput.value = photo.desc || "";
        el.fileInput.value = "";
        el.fileHelp.textContent = photo._pendingFileName ? "待上传：" + photo._pendingFileName : "选择文件后，点击保存时会自动上传到 GitHub。";

        renderPreview(photo);
        updateMoveButtons();
      }

      function renderPreview(photo) {
        var image = photo._previewUrl || photo.image || photo.thumb || "";
        el.previewImage.src = normalizePath(image);
        el.previewTitle.textContent = photo.title || "未命名照片";
        el.previewMeta.textContent = [photo.category || "未分类", photo.date || ""].filter(Boolean).join(" · ");
        el.previewDesc.textContent = photo.desc || "";
      }

      function render() {
        renderList();
        renderForm();
      }

      function saveCurrentFromForm() {
        var photo = selectedPhoto();
        if (!photo) return;

        photo.title = el.titleInput.value.trim();
        photo.category = el.categoryInput.value.trim() || "默认分类";
        photo.date = el.dateInput.value;
        photo.featured = el.featuredInput.checked;
        photo.image = el.imageInput.value.trim();
        photo.desc = el.descInput.value.trim();
      }

      function markDirty() {
        state.dirty = true;
        setStatus(el.saveStatus, "有未保存修改", "warning");
        saveCurrentFromForm();
        renderList();
        renderPreview(selectedPhoto() || {});
      }

      function updateMoveButtons() {
        el.moveUpBtn.disabled = state.selectedIndex <= 0;
        el.moveDownBtn.disabled = state.selectedIndex >= state.photos.length - 1;
        el.deleteBtn.disabled = state.photos.length === 0;
      }

      function addPhoto() {
        saveCurrentFromForm();

        var today = new Date().toISOString().slice(0, 10);
        state.photos.unshift({
          title: "未命名照片",
          category: "默认分类",
          image: "",
          desc: "",
          date: today,
          featured: false
        });

        state.selectedIndex = 0;
        state.dirty = true;
        setStatus(el.saveStatus, "已新增照片，填写后记得保存", "warning");
        render();
      }

      function deletePhoto() {
        var photo = selectedPhoto();
        if (!photo) return;
        if (!window.confirm("确定删除这张照片吗？保存后会从数据中移除。")) return;

        state.photos.splice(state.selectedIndex, 1);
        state.selectedIndex = Math.max(0, state.selectedIndex - 1);
        state.dirty = true;
        setStatus(el.saveStatus, "已删除，点击保存后生效", "warning");
        render();
      }

      function movePhoto(offset) {
        var nextIndex = state.selectedIndex + offset;
        if (nextIndex < 0 || nextIndex >= state.photos.length) return;

        saveCurrentFromForm();

        var item = state.photos.splice(state.selectedIndex, 1)[0];
        state.photos.splice(nextIndex, 0, item);
        state.selectedIndex = nextIndex;
        state.dirty = true;
        setStatus(el.saveStatus, "顺序已调整，点击保存后生效", "warning");
        render();
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function sanitizeFileName(name) {
        var dotIndex = name.lastIndexOf(".");
        var ext = dotIndex >= 0 ? name.slice(dotIndex).toLowerCase() : ".jpg";
        var base = dotIndex >= 0 ? name.slice(0, dotIndex) : name;
        base = base
          .normalize("NFKD")
          .replace(/[^\w\u4e00-\u9fa5-]+/g, "-")
          .replace(/-+/g, "-")
          .replace(/^-|-$/g, "")
          .slice(0, 60);

        return Date.now() + "-" + (base || "photo") + ext;
      }

      function readFileAsBase64(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onload = function () {
            var result = String(reader.result || "");
            resolve(result.split(",")[1] || "");
          };
          reader.onerror = function () {
            reject(new Error("读取图片文件失败"));
          };
          reader.readAsDataURL(file);
        });
      }

      async function uploadPendingFiles() {
        for (var i = 0; i < state.photos.length; i += 1) {
          var photo = state.photos[i];
          if (!photo._pendingFile) continue;

          var fileName = sanitizeFileName(photo._pendingFile.name);
          var path = CONFIG.uploadDir + "/" + fileName;
          var publicPath = CONFIG.publicUploadPrefix + "/" + fileName;
          var content = await readFileAsBase64(photo._pendingFile);

          await github("/repos/" + CONFIG.repo + "/contents/" + encodeURIComponentPath(path), {
            method: "PUT",
            body: {
              message: "Upload gallery image: " + fileName,
              content: content,
              branch: CONFIG.branch
            }
          });

          photo.image = publicPath;
          photo.thumb = publicPath;
          delete photo._pendingFile;
          delete photo._pendingFileName;
          delete photo._previewUrl;
        }
      }

      function encodeURIComponentPath(path) {
        return path.split("/").map(encodeURIComponent).join("/");
      }

      async function loadData() {
        setStatus(el.saveStatus, "正在加载 GitHub 数据...");
        var file = await github("/repos/" + CONFIG.repo + "/contents/" + encodeURIComponentPath(CONFIG.dataPath) + "?ref=" + encodeURIComponent(CONFIG.branch));
        var json = JSON.parse(base64ToUtf8(file.content || ""));
        state.sha = file.sha;
        state.photos = Array.isArray(json) ? json : (json.photos || []);
        state.selectedIndex = Math.min(state.selectedIndex, Math.max(0, state.photos.length - 1));
        state.dirty = false;
        setStatus(el.saveStatus, "数据已加载", "success");
        render();
      }

      async function saveData(event) {
        if (event) event.preventDefault();
        if (state.saving) return;

        try {
          state.saving = true;
          el.saveBtn.disabled = true;
          saveCurrentFromForm();
          setStatus(el.saveStatus, "正在上传图片和保存数据...");

          await uploadPendingFiles();

          var payload = {
            photos: state.photos.map(cleanPhoto)
          };

          var result = await github("/repos/" + CONFIG.repo + "/contents/" + encodeURIComponentPath(CONFIG.dataPath), {
            method: "PUT",
            body: {
              message: "Update gallery photos",
              content: utf8ToBase64(JSON.stringify(payload, null, 2) + "\n"),
              sha: state.sha,
              branch: CONFIG.branch
            }
          });

          state.sha = result.content.sha;
          state.photos = payload.photos;
          state.dirty = false;
          render();
          setStatus(el.saveStatus, "保存成功，GitHub Pages 稍后自动更新", "success");
          toast("保存成功");
        } catch (error) {
          console.error(error);
          setStatus(el.saveStatus, error.message || "保存失败", "error");
          toast("保存失败：" + (error.message || "未知错误"));
        } finally {
          state.saving = false;
          el.saveBtn.disabled = false;
        }
      }

      async function verifyTokenAndLoad() {
        try {
          show("admin");
          setStatus(el.saveStatus, "正在验证登录...");
          state.user = await github("/user");
          await loadData();
          toast("已登录：" + (state.user.login || "GitHub"));
        } catch (error) {
          console.error(error);
          localStorage.removeItem(CONFIG.tokenKey);
          state.token = "";
          show("login");
          setStatus(el.loginStatus, "登录状态无效，请重新登录。" + (error.message ? " " + error.message : ""), "error");
        }
      }

      function parseAuthMessage(data) {
        if (!data) return null;

        if (typeof data === "object") {
          return data.token || data.access_token || (data.payload && data.payload.token) || null;
        }

        if (typeof data !== "string") return null;

        var successPrefix = "authorization:github:success:";
        var errorPrefix = "authorization:github:error:";

        if (data.indexOf(errorPrefix) === 0) {
          throw new Error(data.slice(errorPrefix.length) || "GitHub 登录失败");
        }

        if (data.indexOf(successPrefix) === 0) {
          var raw = data.slice(successPrefix.length);
          var parsed = JSON.parse(raw);
          return parsed.token || parsed.access_token || null;
        }

        try {
          var json = JSON.parse(data);
          return json.token || json.access_token || null;
        } catch (error) {
          return null;
        }
      }

      function loginWithPopup() {
        setStatus(el.loginStatus, "正在打开 GitHub 登录窗口...");
        var popup = window.open(CONFIG.authUrl, "gallery-auth", "width=980,height=720");

        if (!popup) {
          setStatus(el.loginStatus, "浏览器拦截了登录窗口，请允许弹窗后重试。", "error");
          return;
        }

        var timeout = window.setTimeout(function () {
          setStatus(el.loginStatus, "还没有收到登录结果。如果窗口已完成登录但本页没反应，请使用旧版后台或手动 Token。", "warning");
        }, 30000);

        function onMessage(event) {
          try {
            var token = parseAuthMessage(event.data);
            if (!token) return;

            window.clearTimeout(timeout);
            window.removeEventListener("message", onMessage);
            popup.close();

            state.token = token;
            localStorage.setItem(CONFIG.tokenKey, token);
            setStatus(el.loginStatus, "登录成功，正在加载相册...", "success");
            verifyTokenAndLoad();
          } catch (error) {
            window.clearTimeout(timeout);
            window.removeEventListener("message", onMessage);
            setStatus(el.loginStatus, error.message || "登录失败", "error");
          }
        }

        window.addEventListener("message", onMessage);
      }

      function useManualToken() {
        var token = el.manualToken.value.trim();
        if (!token) {
          setStatus(el.loginStatus, "请先输入 token。", "error");
          return;
        }

        state.token = token;
        localStorage.setItem(CONFIG.tokenKey, token);
        verifyTokenAndLoad();
      }

      function logout() {
        localStorage.removeItem(CONFIG.tokenKey);
        state.token = "";
        state.user = null;
        state.photos = [];
        state.sha = "";
        state.selectedIndex = 0;
        state.dirty = false;
        show("login");
        setStatus(el.loginStatus, "已退出。");
      }

      function bindEvents() {
        el.loginBtn.addEventListener("click", loginWithPopup);
        el.showTokenBtn.addEventListener("click", function () {
          el.tokenBox.classList.toggle("show");
        });
        el.useTokenBtn.addEventListener("click", useManualToken);
        el.logoutBtn.addEventListener("click", logout);
        el.reloadBtn.addEventListener("click", function () {
          if (state.dirty && !window.confirm("当前有未保存修改，确定重新加载吗？")) return;
          loadData().catch(function (error) {
            setStatus(el.saveStatus, error.message, "error");
          });
        });
        el.addPhotoBtn.addEventListener("click", addPhoto);
        el.emptyAddBtn.addEventListener("click", addPhoto);
        el.deleteBtn.addEventListener("click", deletePhoto);
        el.moveUpBtn.addEventListener("click", function () {
          movePhoto(-1);
        });
        el.moveDownBtn.addEventListener("click", function () {
          movePhoto(1);
        });
        el.form.addEventListener("submit", saveData);
        el.searchInput.addEventListener("input", function () {
          state.query = el.searchInput.value;
          renderList();
        });

        [
          el.titleInput,
          el.categoryInput,
          el.dateInput,
          el.featuredInput,
          el.imageInput,
          el.descInput
        ].forEach(function (input) {
          input.addEventListener("input", markDirty);
          input.addEventListener("change", markDirty);
        });

        el.fileInput.addEventListener("change", function () {
          var photo = selectedPhoto();
          var file = el.fileInput.files && el.fileInput.files[0];
          if (!photo || !file) return;

          if (photo._previewUrl) {
            URL.revokeObjectURL(photo._previewUrl);
          }

          photo._pendingFile = file;
          photo._pendingFileName = file.name;
          photo._previewUrl = URL.createObjectURL(file);
          el.fileHelp.textContent = "待上传：" + file.name;
          state.dirty = true;
          setStatus(el.saveStatus, "图片已选择，点击保存后上传", "warning");
          renderPreview(photo);
        });

        window.addEventListener("beforeunload", function (event) {
          if (!state.dirty) return;
          event.preventDefault();
          event.returnValue = "";
        });
      }

      bindEvents();

      if (state.token) {
        verifyTokenAndLoad();
      } else {
        show("login");
      }
    })();
  </script>
</body>
</html>
