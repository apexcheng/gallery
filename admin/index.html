<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gallery Admin</title>
  <style>
    :root {
      --admin-bg: #f5f7fb;
      --admin-panel: rgba(255, 255, 255, 0.92);
      --admin-panel-solid: #ffffff;
      --admin-border: rgba(15, 23, 42, 0.1);
      --admin-text: #0f172a;
      --admin-muted: #64748b;
      --admin-primary: #2563eb;
      --admin-primary-dark: #1d4ed8;
      --admin-radius: 18px;
      --admin-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.14), transparent 32rem),
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.12), transparent 30rem),
        var(--admin-bg);
      color: var(--admin-text);
      -webkit-text-size-adjust: 100%;
    }

    * {
      box-sizing: border-box;
    }

    body::before {
      content: "Gallery Admin";
      position: fixed;
      z-index: 1;
      top: 18px;
      left: 26px;
      padding: 10px 16px;
      border: 1px solid var(--admin-border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--admin-text);
      font: 700 15px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.02em;
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      pointer-events: none;
    }

    #nc-root {
      min-height: 100vh;
      position: relative;
      z-index: 2;
      padding-top: 64px;
    }

    #nc-root,
    #nc-root * {
      max-width: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    }

    #nc-root img,
    #nc-root video,
    #nc-root canvas,
    #nc-root svg {
      max-width: 100%;
      height: auto;
    }

    #nc-root input,
    #nc-root textarea,
    #nc-root select {
      border-radius: 12px !important;
      border-color: var(--admin-border) !important;
      background: rgba(255, 255, 255, 0.92) !important;
      color: var(--admin-text) !important;
      box-shadow: none !important;
    }

    #nc-root input:focus,
    #nc-root textarea:focus,
    #nc-root select:focus {
      border-color: rgba(37, 99, 235, 0.55) !important;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14) !important;
      outline: none !important;
    }

    #nc-root button,
    #nc-root [role="button"] {
      border-radius: 12px !important;
      font-weight: 700 !important;
    }

    #nc-root button[class*="primary"],
    #nc-root button[class*="Primary"],
    #nc-root [class*="Button"] button,
    #nc-root a[class*="Button"] {
      box-shadow: 0 10px 22px rgba(37, 99, 235, 0.16) !important;
    }

    #nc-root main,
    #nc-root section,
    #nc-root article,
    #nc-root form,
    #nc-root aside,
    #nc-root [class*="Container"],
    #nc-root [class*="Wrapper"],
    #nc-root [class*="Pane"],
    #nc-root [class*="Panel"],
    #nc-root [class*="Sidebar"],
    #nc-root [class*="Editor"],
    #nc-root [class*="Preview"],
    #nc-root [class*="Control"] {
      min-width: 0 !important;
    }

    #nc-root [class*="AppHeader"],
    #nc-root [class*="Toolbar"],
    #nc-root [class*="TopBar"],
    #nc-root header {
      border-color: var(--admin-border) !important;
      background: rgba(255, 255, 255, 0.76) !important;
      backdrop-filter: blur(18px);
    }

    #nc-root [class*="Sidebar"],
    #nc-root nav,
    #nc-root aside {
      border-color: var(--admin-border) !important;
      background: rgba(255, 255, 255, 0.68) !important;
      backdrop-filter: blur(18px);
    }

    #nc-root [class*="Card"],
    #nc-root [class*="Panel"],
    #nc-root [class*="Pane"],
    #nc-root [class*="Control"] > div,
    #nc-root form > div {
      border-color: var(--admin-border) !important;
      border-radius: var(--admin-radius) !important;
    }

    #nc-root [class*="Editor"],
    #nc-root [class*="ControlPane"],
    #nc-root [class*="Collection"],
    #nc-root [class*="Entry"] {
      background: transparent !important;
    }

    #nc-root [class*="PreviewPane"],
    #nc-root [class*="ControlPane"] {
      border-radius: var(--admin-radius) !important;
      overflow: hidden;
    }

    #nc-root [class*="ListCard"],
    #nc-root [class*="EntryCard"],
    #nc-root [class*="Field"],
    #nc-root [class*="Widget"] {
      border-radius: 16px !important;
    }

    @media (min-width: 769px) {
      #nc-root {
        padding-left: 18px;
        padding-right: 18px;
        padding-bottom: 24px;
      }

      #nc-root > div {
        border-radius: 24px;
      }
    }

    @media (max-width: 768px) {
      html,
      body {
        width: 100%;
        min-width: 0;
        overflow-x: hidden;
      }

      body::before {
        top: max(10px, env(safe-area-inset-top));
        left: 12px;
        padding: 8px 12px;
        font-size: 13px;
      }

      #nc-root {
        width: 100%;
        min-width: 0;
        padding-top: 52px;
        overflow-x: hidden;
      }

      #nc-root,
      #nc-root * {
        max-width: 100vw;
      }

      #nc-root input,
      #nc-root textarea,
      #nc-root select,
      #nc-root button {
        font-size: 16px !important;
      }

      #nc-root main,
      #nc-root section,
      #nc-root article,
      #nc-root form,
      #nc-root aside,
      #nc-root nav,
      #nc-root [class*="Container"],
      #nc-root [class*="Wrapper"],
      #nc-root [class*="Pane"],
      #nc-root [class*="Panel"],
      #nc-root [class*="Sidebar"],
      #nc-root [class*="Editor"],
      #nc-root [class*="Preview"],
      #nc-root [class*="Control"],
      #nc-root [class*="Collection"],
      #nc-root [class*="Entry"] {
        width: 100% !important;
        min-width: 0 !important;
        max-width: 100vw !important;
      }

      #nc-root [class*="SplitPane"],
      #nc-root [class*="EditorContainer"],
      #nc-root [class*="EntryEditor"],
      #nc-root [class*="CollectionMain"] {
        display: block !important;
      }

      #nc-root [class*="PreviewPane"] {
        display: none !important;
      }

      #nc-root [class*="Toolbar"],
      #nc-root [class*="Actions"],
      #nc-root [class*="Buttons"],
      #nc-root header,
      #nc-root nav {
        flex-wrap: wrap !important;
        gap: 8px !important;
      }

      #nc-root [class*="Toolbar"] button,
      #nc-root [class*="Actions"] button,
      #nc-root [class*="Buttons"] button {
        min-height: 42px !important;
      }

      #nc-root [class*="Sidebar"],
      #nc-root aside {
        position: relative !important;
        height: auto !important;
      }

      #nc-root [class*="Field"],
      #nc-root [class*="Widget"],
      #nc-root form > div {
        padding-left: 12px !important;
        padding-right: 12px !important;
      }
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
