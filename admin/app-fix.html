<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gallery Admin</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f7fb;color:#0f172a;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .box{width:min(420px,calc(100vw - 32px));padding:24px;border:1px solid #e2e8f0;border-radius:18px;background:#fff;box-shadow:0 18px 50px rgba(15,23,42,.08)}
    p{color:#64748b;line-height:1.6}
  </style>
</head>
<body>
  <div class="box">
    <h1>正在加载新版后台...</h1>
    <p id="status">正在应用登录后渲染修复。</p>
  </div>
  <script>
    (function(){
      var statusNode = document.getElementById('status');
      fetch('app.html?v=' + Date.now(), { cache: 'no-store' })
        .then(function(res){ return res.text(); })
        .then(function(html){
          var fixed = html
            .replace('sub:$("sub"),form:$("form")', 'sub:$("sub"),editor:$("editor"),form:$("form")')
            .replace('sub:$("sub"),form:$("form"),', 'sub:$("sub"),editor:$("editor"),form:$("form"),');

          if (fixed === html) {
            statusNode.textContent = '未找到需要修复的位置，将直接打开原后台。';
          }

          document.open();
          document.write(fixed);
          document.close();
        })
        .catch(function(err){
          statusNode.textContent = '加载失败：' + (err && err.message ? err.message : err);
        });
    })();
  </script>
</body>
</html>
