backend:
  name: github
  repo: apexcheng/gallery
  branch: main
  # GitHub Pages 不能直接处理 GitHub OAuth。
  # 接入 OAuth Proxy 后，取消下面两行注释并替换域名。
  # base_url: https://your-oauth-proxy.example.com
  # auth_endpoint: auth

media_folder: "assets/images/uploads"
public_folder: "/gallery/assets/images/uploads"

locale: "zh_Hans"

collections:
  - name: "data"
    label: "相册数据"
    files:
      - name: "photos"
        label: "照片管理"
        file: "data/photos.json"
        format: "json"
        fields:
          - label: "照片列表"
            name: "photos"
            widget: "list"
            summary: "{{fields.title}} · {{fields.category}}"
            fields:
              - label: "标题"
                name: "title"
                widget: "string"
              - label: "分类"
                name: "category"
                widget: "string"
                default: "默认分类"
              - label: "图片"
                name: "image"
                widget: "image"
                allow_multiple: false
              - label: "缩略图"
                name: "thumb"
                widget: "image"
                allow_multiple: false
                required: false
                hint: "不填也可以，前台会使用原图。"
              - label: "描述"
                name: "desc"
                widget: "text"
                required: false
              - label: "日期"
                name: "date"
                widget: "datetime"
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
                required: false
              - label: "是否精选"
                name: "featured"
                widget: "boolean"
                default: false
                required: false
